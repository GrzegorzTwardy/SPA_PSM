<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .register-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ważne, aby padding nie powiększał pola */
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;

            label.accept-terms {
                font-weight: normal;
                font-size: 0.9em;
                margin: 0.1em 0 0 0;
            }
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #42b883;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        button:disabled {
            background-color: #cccccc;
        }

        button:hover {
            cursor: pointer;
        }

        .hint {
            font-size: 12px;
            color: #6d6d6d;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="app" class="register-container">
        <h2>Rejestracja</h2>
        
        <div class="form-group">
            <label>Imię i nazwisko:</label>
            <input type="text" v-model="fullName" placeholder="Jan Kowalski">
        </div>

        <div class="form-group">
            <label>E-mail:</label>
            <input type="email" v-model="email" placeholder="email@przyklad.pl">
        </div>

        <div class="form-group">
            <label>Hasło:</label>
            <input type="password" v-model="password">
        </div>

        <div class="form-group">
            <label>Powtórz hasło:</label>
            <input type="password" v-model="confirmPassword">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="terms" v-model="acceptTerms">
            <label for="terms" class="accept-terms">Akceptuję regulamin</label>
        </div>

        <button :disabled="!isFormValid" @click="register">
            Zarejestruj
        </button>

        <p class="hint" v-if="!isFormValid">
            * Wypełnij wszystkie pola, podaj poprawny e-mail i upewnij się, że hasła są identyczne.
        </p>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    fullName: '',
                    email: '',
                    password: '',
                    confirmPassword: '',
                    acceptTerms: false
                }
            },
            computed: {
                isFormValid() {
                    const isNotEmpty = this.fullName.trim() !== '' && 
                                       this.email.trim() !== '' && 
                                       this.password !== '' && 
                                       this.confirmPassword !== '';
                    
                    const isEmailValid = this.email.includes('@');
                    const passwordsMatch = this.password === this.confirmPassword;
                    const termsAccepted = this.acceptTerms === true;

                    return isNotEmpty && isEmailValid && passwordsMatch && termsAccepted;
                }
            },
            methods: {
                register() {
                    alert('Zarejestrowano');
                }
            }
        }).mount('#app');
    </script>

</body>
</html>
