<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-align: center;
        }

        button {
            font-size: 1.2em;
            font-weight: bold;
            border: 0;
            border-radius: 20px;
            background-color: rgb(24, 214, 81);
            color: white;
            padding: 0.5em 1.2em;

            &:active {
                background-color: rgb(7, 172, 57);
                transition: 0.2s ease;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>{{ counter }}</h1>
        <button @click.left="decrement" @contextmenu.prevent="increment">
            Click Me
        </button>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    counter: 0
                }
            },
            methods: {
                decrement() {
                    this.counter--;
                },
                increment() {
                    this.counter++;
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
